name: Deploy backend to HF Space

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/hf-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push backend to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "ashutosh.bharti@auricai.in"
          git config user.name "Ashutosh Bharti"
          git subtree push --prefix backend \
            https://Ashu212:${HF_TOKEN}@huggingface.co/spaces/Ashu212/inference-engine main
